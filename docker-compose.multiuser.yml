services:
  caddy:
    image: caddy:2.11-alpine
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data

  s3:
    build: .
    image: loch/s3
    ports:
      - "8080:8080"
    environment:
      - S3_PORT=8080
      - S3_DATA_DIR=/data
      - S3_USERS_FILE=/data/.users.json
      - S3_ADMIN_API_KEY=super-secret
    volumes:
      - s3-multiuser-data:/data

volumes:
  s3-multiuser-data:
  caddy-data:
