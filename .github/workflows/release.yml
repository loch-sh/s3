name: Release

on:
  push:
    tags: ["[0-9]*", "v*"]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: s3-linux-amd64.tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: s3-linux-arm64.tar.gz
          - target: x86_64-pc-windows-gnu
            runner: ubuntu-latest
            archive: s3-windows-amd64.zip
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: s3-macos-amd64.tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: s3-macos-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (Linux targets)
        if: matrix.runner == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.runner == 'ubuntu-latest'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.runner == 'macos-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Archive (Linux / macOS)
        if: "!contains(matrix.target, 'windows')"
        run: tar czf ${{ matrix.archive }} -C target/${{ matrix.target }}/release s3

      - name: Archive (Windows)
        if: contains(matrix.target, 'windows')
        run: zip ${{ matrix.archive }} target/${{ matrix.target }}/release/s3.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          files: |
            *.tar.gz
            *.zip
